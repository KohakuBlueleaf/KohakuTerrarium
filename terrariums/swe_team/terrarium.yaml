# SWE Team Terrarium
# A software engineering team: developer implements, reviewer reviews.
#
# Topology:
#   tasks -> swe (implements) -> review -> reviewer (reviews)
#   reviewer sends feedback or approval back
#   team_chat broadcast for coordination

terrarium:
  name: swe_team

  root:
    base_config: creatures/root
    controller:
      model: gpt-5.4
      auth_mode: codex-oauth
      reasoning_effort: high
      tool_format: native

  creatures:
    - name: swe
      base_config: creatures/swe
      controller:
        model: gpt-5.4
        auth_mode: codex-oauth
        reasoning_effort: xhigh
        service_tier: priority
        tool_format: native
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [review, team_chat]

    - name: reviewer
      base_config: creatures/reviewer
      controller:
        model: gpt-5.4
        auth_mode: codex-oauth
        reasoning_effort: high
        tool_format: native
      channels:
        listen: [review, team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    tasks:      { type: queue, description: "Incoming task assignments" }
    review:     { type: queue, description: "Code changes submitted for review" }
    feedback:   { type: queue, description: "Review feedback back to developer" }
    results:    { type: queue, description: "Final approved results" }
    team_chat:  { type: broadcast, description: "Team coordination and status" }
